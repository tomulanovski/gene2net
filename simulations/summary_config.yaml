# Summary Pipeline Configuration
# Configuration for phylogenetic network inference evaluation pipeline

# Methods and their standardized output files
# All methods use {program}_result.tre after post-processing
methods:
  grampa:
    directory: "grampa"
    output_file: "grampa_result.tre"
  polyphest_p50:
    directory: "polyphest_p50"
    output_file: "polyphest_result.tre"
  polyphest_p70:
    directory: "polyphest_p70"
    output_file: "polyphest_result.tre"
  polyphest_p90:
    directory: "polyphest_p90"
    output_file: "polyphest_result.tre"
  mpsugar:
    directory: "mpsugar"
    output_file: "mpsugar_result.tre"
  padre:
    directory: "padre"
    output_file: "padre_result.tre"
  alloppnet:
    directory: "alloppnet"
    output_file: "alloppnet_result.tre"
  grandma_split:
    directory: "grandma_split"
    output_file: "final_multree.tre"

# Network list (21 networks)
networks:
  - Bendiksby_2011
  - Koenen_2020
  - Brysting_2007
  - Lawrence_2016
  - Diaz-Perez_2018
  - Wisecaver_2023
  - Ding_2023
  - Liang_2019
  - Popp_2005
  - Wu_2015
  - Liu_2023
  - Ren_2024
  - Marcussen_2011
  - Marcussen_2012
  - Sessa_2012b
  - Zhao_2021
  - Hori_2014
  - Marcussen_2015
  - Shahrestani_2015
  - Morales-Briones_2021
  - Soza_2014

# Paths
base_dir: "/groups/itay_mayrose/tomulanovski/gene2net/simulations/simulations"
networks_dir: "/groups/itay_mayrose/tomulanovski/gene2net/simulations/networks"
output_dir: "/groups/itay_mayrose/tomulanovski/gene2net/simulations/analysis/summary"

# Settings
num_replicates: 5
force_recompute: false
