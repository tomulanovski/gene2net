# Two-parent graft phaser: WGD detection + UNORDERED two-parent placement.
# Same backbone/features as reconstruct.yaml; the partner head emits 2 parent
# slots (n_parents=2) trained with a permutation-invariant loss, decoded through
# the nested-safe graft build.

model:
  node_feat_dim: 13          # 8 copy count + 5 clustering summary
  edge_feat_dim: 9           # 4 base + 5 WGD-detection
  hidden_dim: 64
  n_gat_layers: 3
  n_gat_heads: 4
  dropout: 0.2
  partner_pair_feat_dim: 4   # 2 clade co-clustering (mean,max) + 2 copy-aware cluster-support
  n_parents: 2               # unordered parent pair (the two-parent phaser)

training:
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 8
  max_epochs: 200
  patience: 30
  pos_class_weight: 12.0
  focal_alpha: 0.25
  focal_gamma: 2.0
  partner_weight: 1.0        # weight of the two-parent loss vs detection loss
  val_split: 0.2
