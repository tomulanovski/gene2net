# Reconstruction: WGD detection + partner-edge prediction (auto/allo via self-partner)
# Same backbone as Phase 1 (9 edge features) plus a partner head.

model:
  node_feat_dim: 13          # 8 copy count + 5 clustering summary
  edge_feat_dim: 9           # 4 base + 5 WGD-detection
  hidden_dim: 64
  n_gat_layers: 3
  n_gat_heads: 4
  dropout: 0.2
  partner_pair_feat_dim: 2    # clade i<->j co-clustering (mean, max) for the allo partner head

training:
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 8              # gradient accumulation steps
  max_epochs: 200
  patience: 30
  pos_class_weight: 12.0     # detection class imbalance
  focal_alpha: 0.25
  focal_gamma: 2.0
  partner_weight: 1.0        # weight of the partner cross-entropy vs detection loss
  val_split: 0.2
