# Phase 2: Gene tree summary features + species tree GNN
# Same model as Phase 1 but with 5 additional edge features from gene trees
# Edge features: concordance, branch_length, clade_size, depth + 5 gene tree features

model:
  node_feat_dim: 13
  edge_feat_dim: 9     # was 4 in Phase 1
  hidden_dim: 64
  n_gat_layers: 3
  n_gat_heads: 4
  dropout: 0.2

training:
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 8
  max_epochs: 100
  patience: 30
  pos_class_weight: 6.0
  focal_alpha: 0.25
  focal_gamma: 2.0
  val_split: 0.2
