# Phase 3: Gene tree topology features + species tree GNN
# Same model as Phase 1 but with 3 additional topology features from gene trees
# Edge features: concordance, branch_length, clade_size, depth + 3 topology features
#   - paralog_colocation: coordinated duplication across clade species
#   - clade_monophyly: monophyletic grouping strength in gene trees
#   - duplication_depth_consistency: consistent duplication point depth

model:
  node_feat_dim: 13
  edge_feat_dim: 7     # was 4 in Phase 1
  hidden_dim: 64
  n_gat_layers: 3
  n_gat_heads: 4
  dropout: 0.2

training:
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 8
  max_epochs: 100
  patience: 30
  pos_class_weight: 6.0
  focal_alpha: 0.25
  focal_gamma: 2.0
  val_split: 0.2
